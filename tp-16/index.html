<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recetario Chino - TheMealDB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5">
        <h1 class="text-center mb-4 text-danger">🇨🇳 Recetario de Comidas Chinas 🇨🇳</h1>
        <p class="text-center text-muted mb-5">Hacé clic en "Ver Receta" para ver los detalles completos.</p>
        
        <div class="row row-cols-1 row-cols-md-3 g-4" id="lista-recetas">
            </div>
    </div>

    <div class="modal fade" id="modalReceta" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold text-capitalize" id="modal-titulo">Nombre de la Receta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="modal-foto" src="" class="img-fluid rounded mb-3 shadow" style="max-height: 300px;" alt="Comida">
                    
                    <div class="text-start">
                        <h5><strong>Categoría / Región:</strong> <span id="modal-descripcion" class="badge bg-secondary"></span></h5>
                        <hr>
                        <h5><strong>Ingredientes:</strong></h5>
                        <ul id="modal-ingredientes" class="list-group list-group-flush mb-3"></ul>
                        <hr>
                        <h5><strong>Pasos de preparación:</strong></h5>
                        <p id="modal-pasos" class="text-muted" style="white-space: pre-line;"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Variables para conectarnos con el HTML
        const contenedorRecetas = document.getElementById('lista-recetas');
        
        // Creamos la ventana flotante usando la herramienta de Bootstrap
        const miModal = new bootstrap.Modal(document.getElementById('modalReceta'));

        // 1. CONEXIÓN A LA API: Buscamos recetas de área "Chinese" (China)
        const urlAPI = 'https://www.themealdb.com/api/json/v1/1/filter.php?a=Chinese';

        fetch(urlAPI)
            .then(respuesta => respuesta.json()) // Convertimos la respuesta a un formato legible por JS
            .then(datos => {
                // Mandamos la lista de platos encontrados a la función que los dibuja
                dibujarListado(datos.meals);
            })
            .catch(error => console.error("Error al traer datos:", error));

        // 2. DIBUJAR LISTADO: Crea las tarjetas iniciales solo con Nombre y Foto
        function dibujarListado(comidas) {
            contenedorRecetas.innerHTML = ''; // Vaciamos por seguridad

            comidas.forEach(comida => {
                const columna = document.createElement('div');
                columna.className = 'col';

                // Ponemos el Nombre de la receta y un botón que pasa el ID de esa comida
                columna.innerHTML = `
                    <div class="card h-100 shadow-sm">
                        <img src="${comida.strMealThumb}" class="card-img-top" alt="${comida.strMeal}">
                        <div class="card-body text-center">
                            <h5 class="card-title fw-bold">${comida.strMeal}</h5>
                            <button class="btn btn-danger mt-2" onclick="buscarDetalle('${comida.idMeal}')">Ver Receta</button>
                        </div>
                    </div>
                `;
                contenedorRecetas.appendChild(columna);
            });
        }

        // 3. BUSCAR DETALLE: Cuando tocan el botón, va a buscar los datos completos de ESA receta usando su ID
        function buscarDetalle(id) {
            const urlDetalle = `https://www.themealdb.com/api/json/v1/1/lookup.php?i=${id}`;

            fetch(urlDetalle)
                .then(res => res.json())
                .then(data => {
                    const recetaCompleta = data.meals[0];
                    mostrarModalConDatos(recetaCompleta); // Le mandamos todo el objeto a la ventana flotante
                });
        }

        // 4. MOSTRAR LOS 5 DETALLES EN LA VENTANA FLOTANTE
        function mostrarModalConDatos(receta) {
            // Ponemos los datos directos en el HTML del Modal
            document.getElementById('modal-titulo').textContent = receta.strMeal; // 1. Nombre
            document.getElementById('modal-foto').src = receta.strMealThumb; // 5. Foto
            document.getElementById('modal-descripcion').textContent = `${receta.strCategory} | ${receta.strArea}`; // 2. Descripción
            document.getElementById('modal-pasos').textContent = receta.strInstructions; // 4. Pasos

            // 3. Juntar los ingredientes (La API los da separados del 1 al 20, los filtramos si están vacíos)
            const listaIngredientes = document.getElementById('modal-ingredientes');
            listaIngredientes.innerHTML = ''; // Limpiamos la lista anterior

            for (let i = 1; i <= 20; i++) {
                const ingrediente = receta[`strIngredient${i}`];
                const cantidad = receta[`strMeasure${i}`];

                // Si el ingrediente tiene texto y no está en blanco, lo sumamos a la pantalla
                if (ingrediente && ingrediente.trim() !== "") {
                    const li = document.createElement('li');
                    li.className = 'list-group-item';
                    li.textContent = `• ${ingrediente} (${cantidad})`;
                    listaIngredientes.appendChild(li);
                }
            }

            // Finalmente, abrimos la ventana flotante para que el usuario la vea
            miModal.show();
        }
    </script>
</body>
</html>
