<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de Contactos - DOM y JavaScript</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container my-1 my-sm-2 my-md-4 my-lg-5">
        <h1>Lista de Contactos</h1>
        <div class="card">
            <div class="card-body">
                <h2>Contactos</h2>
                
                <div class="mb-3 d-flex gap-2 align-items-center">
                    <button class="btn btn-outline-secondary btn-sm" id="btn-ordenar-nombre">Ordenar por Nombre</button>
                    <button class="btn btn-outline-secondary btn-sm" id="btn-ordenar-apellido">Ordenar por Apellido</button>
                    <div class="form-check ms-3">
                        <input class="form-check-input" type="checkbox" id="chk-favoritos">
                        <label class="form-check-label"自动 for="chk-favoritos">Ver sólo favoritos</label>
                    </div>
                </div>

                <ul id="lista-contactos" class="list-group mb-3"></ul>
                
                <hr class="hr">
                <h2>Nuevo Contacto</h2>
                <form id="form-producto">
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" name="nombre" id="input-nombre" placeholder="Nombre" required>
                        <input type="text" class="form-control" name="apellido" id="input-apellido" placeholder="Apellido" required>
                        <input type="text" class="form-control" name="telefono" id="input-telefono" placeholder="Teléfono" required>
                    </div>
                    <button class="btn btn-primary" type="submit">Agregar Contacto</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Estructura de datos actualizada con teléfono y favorito
        let contactos = [
            { nombre: 'Juan', apellido: 'Perez', telefono: '12345678', favorito: false },
        ];

        // Muestra el listado en el DOM aplicando el filtro de favoritos si corresponde
        function mostrarListado() {
            const listaHTML = document.getElementById('lista-contactos');
            listaHTML.innerHTML = ''; // Limpiar lista anterior

            const soloFavoritos = document.getElementById('chk-favoritos').checked;

            contactos.forEach((contacto, indice) => {
                // Si el filtro está activo y el contacto no es favorito, lo salta
                if (soloFavoritos && !contacto.favorito) {
                    return;
                }

                const li = document.createElement('li');
                li.className = "list-group-item d-flex justify-content-between align-items-center";
                
                // Texto del contacto
                li.textContent = `${contacto.apellido}, ${contacto.nombre} - Tel: ${contacto.telefono}`;

                // Botón de favorito
                const btnFav = document.createElement('button');
                btnFav.className = contacto.favorito ? "btn btn-warning btn-sm" : "btn btn-outline-warning btn-sm";
                btnFav.textContent = contacto.favorito ? "★ Favorito" : "☆ Marcar Favorito";
                
                // Evento para alternar favorito
                btnFav.addEventListener('click', () => {
                    alternarFavorito(indice);
                });

                li.appendChild(btnFav);
                listaHTML.appendChild(li);
            });
        }

        // Agrega un nuevo objeto contacto al array y renderiza
        function agregarContacto(nombre, apellido, telefono) {
            contactos.push({
                nombre: nombre,
                apellido: apellido,
                telefono: telefono,
                favorito: false
            });
            mostrarListado();
        }

        // Alterna el estado de favorito usando el índice del array
        function alternarFavorito(indice) {
            contactos[indice].favorito = !contactos[indice].favorito;
            mostrarListado();
        }

        // Ordena genéricamente por cualquier propiedad del objeto (nombre o apellido)
        function ordenarPor(propiedad) {
            contactos.sort((a, b) => a[propiedad].localeCompare(b[propiedad]));
            mostrarListado();
        }

        // Manejador del formulario
        function handlerFormulario(e) {
            e.preventDefault();
            const inputNombre = e.target.querySelector('#input-nombre');
            const inputApellido = e.target.querySelector('#input-apellido');
            const inputTelefono = e.target.querySelector('#input-telefono');

            const nombre = inputNombre.value;
            const apellido = inputApellido.value;
            const telefono = inputTelefono.value;

            inputNombre.value = "";
            inputApellido.value = "";
            inputTelefono.value = "";

            agregarContacto(nombre, apellido, telefono);
        }

        // Listeners de eventos
        document.querySelector('form').addEventListener('submit', handlerFormulario);
        
        document.getElementById('btn-ordenar-nombre').addEventListener('click', () => ordenarPor('nombre'));
        document.getElementById('btn-ordenar-apellido').addEventListener('click', () => ordenarPor('apellido'));
        document.getElementById('chk-favoritos').addEventListener('change', mostrarListado);

        // Renderizado inicial
        mostrarListado();
    </script>
</body>
</html>
