<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de Compras - DOM y JavaScript</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
</head>
<body>
    <div class="container my-1 my-sm-2 my-md-4 my-lg-5">
        <h1>Lista de Compras</h1>
        <div class="card">
            <div class="card-body">
                <h2>Listado de Productos</h2>
                
                <ul id="lista-productos">
                    </ul>

                <hr class="hr">
                
                <h2>Agregar Producto</h2>
                <form id="form-producto">
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" aria-label="Nombre del Producto" required>
                        <button class="btn btn-primary" type="submit">Agregar Producto</button>
                    </div>
                </form>

                <div class="mt-3">
                    <button id="btn-ordenar" class="btn btn-secondary me-2">Ordenar Alfabéticamente</button>
                    <button id="btn-limpiar" class="btn btn-danger">Limpiar Lista</button>
                </div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
    <script type="text/javascript">
        
        // --- NUESTRAS VARIABLES ---
        // Creamos una lista vacía en JavaScript para guardar los nombres de los productos
        let misProductos = ["Pan"]; 

        // --- FUNCIÓN PARA MOSTRAR LOS PRODUCTOS EN EL HTML ---
        function actualizarPantalla() {
            let ul = document.querySelector("#lista-productos");
            ul.innerHTML = ""; // Borramos todo lo que había para no duplicar

            // Recorremos nuestro array producto por producto
            for (let i = 0; i < misProductos.length; i++) {
                // Creamos un código HTML para cada renglón con un botón de eliminar al lado
                ul.innerHTML += `
                    <li class="d-flex justify-content-between align-items-center my-2">
                        ${misProductos[i]}
                        <button class="btn btn-sm btn-outline-danger" onclick="eliminarProducto(${i})">Eliminar</button>
                    </li>
                `;
            }
        }

        // --- 1. AGREGAR PRODUCTO ---
        function agregarProducto(nombreProducto) {
            // Validamos que el usuario no envíe algo vacío
            if (nombreProducto.trim() !== "") {
                misProductos.push(nombreProducto); // Lo sumamos a nuestra lista interna
                actualizarPantalla(); // Volvemos a dibujar la pantalla
            }
        }

        // --- 2. LIMPIAR LISTA ---
        function limpiarLista() {
            misProductos = []; // Vaciamos por completo el array
            actualizarPantalla(); // Limpiamos la pantalla
        }

        // --- 3. ORDENAR ALFABÉTICAMENTE ---
        function ordenarProductos() {
            misProductos.sort(); // El método .sort() ordena textos de la A a la Z automáticamente
            actualizarPantalla(); // Mostramos el nuevo orden en pantalla
        }

        // --- 4. ELIMINAR UN PRODUCTO INDIVIDUAL ---
        function eliminarProducto(indice) {
            // .splice(indice, 1) borra exactamente 1 elemento en la posición que le pasemos
            misProductos.splice(indice, 1);
            actualizarPantalla(); // Volvemos a dibujar para ocultar el eliminado
        }

        // --- CONTROLADORES DE EVENTOS (BOTONES Y FORMULARIO) ---
        function handlerFormulario(evento) {
            evento.preventDefault(); 
            const input = evento.target.querySelector('input');
            const nombreProducto = input.value;
            input.value = "";
            agregarProducto(nombreProducto);
        }

        // Escuchamos cuando se envía el formulario
        document.querySelector('form').addEventListener('submit', handlerFormulario);

        // Escuchamos los clics en los nuevos botones de Limpiar y Ordenar
        document.querySelector('#btn-limpiar').addEventListener('click', limpiarLista);
        document.querySelector('#btn-ordenar').addEventListener('click', ordenarProductos);

        // Al cargar la página por primera vez, mostramos lo que haya en la lista (en este caso, "Pan")
        actualizarPantalla();

    </script>
</body>
</html>
