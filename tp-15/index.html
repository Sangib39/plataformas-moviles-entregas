<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Tablero Simple</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container text-center mt-5">

    <h1>el tablero de superclasico</h1>
    
    <div class="row my-4 fs-1 fw-bold">
        <div class="col-5">
            <span id="puntos-local">0</span>
            <p class="fs-5">boca</p>
        </div>
        <div class="col-2">:</div>
        <div class="col-5">
            <span id="puntos-visitante">0</span>
            <p class="fs-5">riber</p>
        </div>
    </div>

    <div class="row justify-content-center gap-2">
        <div class="col-12">
            <h3>Sumar y Restar</h3>
            <button class="btn btn-success" id="local-mas">Local +1</button>
            <button class="btn btn-danger" id="local-menos">Local -1</button>
            |
            <button class="btn btn-success" id="visitante-mas">Visitante +1</button>
            <button class="btn btn-danger" id="visitante-menos">Visitante -1</button>
        </div>
        
        <div class="col-12 mt-4">
            <h3>Acciones del Partido</h3>
            <button class="btn btn-warning" id="btn-invertir">Invertir Lados</button>
            <button class="btn btn-dark" id="btn-finalizar">Terminar Partido</button>
            <button class="btn btn-secondary" id="btn-reinicio">Resetear Todo</button>
        </div>
    </div>

    <script>
        // 1. Guardamos los puntos en variables (empezando en 0)
        let local = 0;
        let visitante = 0;

        // 2. Guardamos en variables las "pantallas" del HTML para cambiar sus textos después
        const pantallaLocal = document.getElementById('puntos-local');
        const pantallaVisitante = document.getElementById('puntos-visitante');

        // --- BOTONES DE SUMA Y RESTA ---
        
        // Cuando hacen clic en "Local +1"
        document.getElementById('local-mas').addEventListener('click', function() {
            local = local + 1;                  // Suma 1 punto
            pantallaLocal.textContent = local;  // Lo muestra en la pantalla
        });

        // Cuando hacen clic en "Local -1"
        document.getElementById('local-menos').addEventListener('click', function() {
            if (local > 0) {                    // Solo resta si es mayor a 0 (no queremos números negativos)
                local = local - 1;
                pantallaLocal.textContent = local;
            }
        });

        // Cuando hacen clic en "Visitante +1"
        document.getElementById('visitante-mas').addEventListener('click', function() {
            visitante = visitante + 1;
            pantallaVisitante.textContent = visitante;
        });

        // Cuando hacen clic en "Visitante -1"
        document.getElementById('visitante-menos').addEventListener('click', function() {
            if (visitante > 0) {
                visitante = visitante - 1;
                pantallaVisitante.textContent = visitante;
            }
        });


        // --- BOTONES ESPECIALES ---

        // Invertir: Cambia los puntos de un equipo al otro
        document.getElementById('btn-invertir').addEventListener('click', function() {
            let temporal = local;      // Guardamos los puntos del local en una "caja temporal" para no perderlos
            local = visitante;         // Le pasamos los puntos del visitante al local
            visitante = temporal;      // Le pasamos lo que guardamos en la caja temporal al visitante
            
            // Actualizamos las dos pantallas para mostrar el cambio
            pantallaLocal.textContent = local;
            pantallaVisitante.textContent = visitante;
        });

        // Finalizar: Desactiva los botones para que nadie pueda seguir sumando puntos
        document.getElementById('btn-finalizar').addEventListener('click', function() {
            document.getElementById('local-mas').disabled = true;
            document.getElementById('local-menos').disabled = true;
            document.getElementById('visitante-mas').disabled = true;
            document.getElementById('visitante-menos').disabled = true;
            document.getElementById('btn-invertir').disabled = true;
        });

        // Reinicio: Pone todo en cero y vuelve a activar los botones
        document.getElementById('btn-reinicio').addEventListener('click', function() {
            local = 0;
            visitante = 0;
            pantallaLocal.textContent = 0;
            pantallocalVisitante = 0;
            pantallaVisitante.textContent = 0;

            // Volvemos a prender todos los botones
            document.getElementById('local-mas').disabled = false;
            document.getElementById('local-menos').disabled = false;
            document.getElementById('visitante-mas').disabled = false;
            document.getElementById('visitante-menos').disabled = false;
            document.getElementById('btn-invertir').disabled = false;
        });
    </script>
</body>
</html>
